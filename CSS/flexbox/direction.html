<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flex Direction</title>
  <style>
    .container {
      color: white;
      display: flex;
      flex-direction: column;
      display: inline-flex;
    }
    .container > *{
      flex-basis: 100px;
    }
    .red {background-color: #eb4d4b; border: 2px solid black;}
    .orange {background-color: #f0932b; border: 2px solid black;}
    .yellow {background-color: #f6e58d; border: 2px solid black;}
    .green {background-color: #6ab04c; border: 2px solid black;}
    .blue {background-color: #4834d4; border: 2px solid black;}
    .indigo {background-color: #30336b; border: 2px solid black;}
    .purple {background-color: #be2edd; border: 2px solid black;}
  </style>
</head>

<body>
  <div class="container">
    <div class="red">Red</div>
    <div class="orange">Orange</div>
    <div class="yellow">Yellow</div>
    <div class="green">Green</div>
    <div class="blue">Blue</div>
    <div class="indigo">Indigo</div>
    <div class="purple">Purple</div>
  </div>
  
</body>

</html>
