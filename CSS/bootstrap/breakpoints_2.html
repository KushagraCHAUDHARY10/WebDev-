<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Bootstrap Breakpoints_2</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <style>
            .one{
                background-color: red;
            }
            .two{
                background-color: burlywood;
            }
            .three{
                background-color: greenyellow;
            }
            .four{
                background-color: gold;
            }
            .five{
                background-color: skyblue;
            }
            .six{
                background-color: pink;
            }
            .seven{
                background-color: orange;
            }
        </style>
    </head>
    <body>
        <div class="row">
            <div class="one col-xl-6 col-sm-12">50% desktop, 100% mobile</div>
            <div class="two col-xl-6 col-sm-12">50% desktop, 100% mobile</div>
        </div>
        <div class="row">
            <div class="three col-lg-6 col-sm-12">Column 1</div>
            <div class="four col-lg-3 col-sm-6">Column 2</div>
            <div class="five col-lg-3 col-sm-6">Column 3</div>
        </div>
        <div class="row">
            <div class="six col-xxl-1 col-xl-2 col-lg-4 col-md-6 col-sm-12">Column 1</div>
            <div class="seven col-xxl-11 col-xl-10 col-lg-8 col-md-6 col-sm-12">Column 2</div>
        </div>
    </body>
</html>
